# Copie este arquivo para .streamlit/secrets.toml e mantenha o arquivo real fora do Git.

[app]
allow_demo_data = true
session_timeout_minutes = 30

[supabase]
project_url = "https://seu-projeto.supabase.co"
publishable_key = "sb_publishable_xxx"
# Se a conexao direta nao resolver DNS, use a connection string do Connection pooler.
database_url = "postgresql://postgres:SENHA@db.seu-projeto.supabase.co:5432/postgres"

[[auth.users]]
username = "admin"
display_name = "Administrador"
password_hash = "gere-com-python scripts/hash_password.py"
clients = ["bemove"]

[clients.bemove.evo]
user = "usuario-da-integracao"
password = "senha-da-integracao"
